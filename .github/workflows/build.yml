name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-SDL3

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Verify
        run: |
          test -f build/magnetar.exe
          echo "Build artifact exists"
          ls -lh build/magnetar.exe build/*.dll

      - name: Package
        run: |
          mkdir -p release/Magnetar
          cp build/magnetar.exe release/Magnetar/
          cp build/SDL3.dll release/Magnetar/
          cp build/libgcc_s_seh-1.dll release/Magnetar/
          cp build/libstdc++-6.dll release/Magnetar/
          cp build/libwinpthread-1.dll release/Magnetar/
          cp LICENSE release/Magnetar/
          cp README.md release/Magnetar/
          cd release && 7z a -tzip ../Magnetar-Windows-x64.zip Magnetar/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magnetar-Windows-x64
          path: Magnetar-Windows-x64.zip

  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Magnetar-Windows-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: Magnetar-Windows-x64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
